<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLIW — Liberdade Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#05050a;--bg2:#0a0a12;--bg3:#0f0f1a;--bg4:#161622;--card:#0d0d18;
  --border:#1a1a2e;--border2:#252540;--border3:#2e2e50;
  --accent:#7c6af7;--accent2:#5b4de0;--accent3:#a599ff;--accent4:#c4baff;
  --green:#1ed97a;--green2:#0a5e35;--green3:#0d7a44;
  --red:#f0485a;--red2:#5c1a22;--red3:#7a2030;
  --yellow:#f5c842;--yellow2:#7a6010;
  --cyan:#18d4e8;--cyan2:#0a5c66;
  --gold:#d4a843;--gold2:#8a6a20;
  --text:#eeeef5;--text2:#8a8aaa;--text3:#4a4a6a;--text4:#2a2a45;
  --radius:14px;--radius2:10px;--radius3:6px;
  --shadow:0 8px 40px rgba(0,0,0,0.7);
  --glow:0 0 40px rgba(124,106,247,0.12);
  --glow2:0 0 20px rgba(30,217,122,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}

/* ═══════════ NOISE OVERLAY ═══════════ */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4;}

/* ═══════════ LOGIN ═══════════ */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse 100% 80% at 50% -20%,rgba(124,106,247,0.2) 0%,transparent 65%),var(--bg);}
.login-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(124,106,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.login-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.login-orb.o1{width:400px;height:400px;background:rgba(124,106,247,0.12);top:-100px;right:-100px;}
.login-orb.o2{width:300px;height:300px;background:rgba(30,217,122,0.08);bottom:-80px;left:-60px;}
.login-wrap{position:relative;z-index:2;width:100%;max-width:440px;padding:16px;}
.login-box{background:rgba(13,13,24,0.92);border:1px solid var(--border2);border-radius:24px;padding:52px 44px;backdrop-filter:blur(20px);box-shadow:var(--shadow),var(--glow);}
.login-logo-wrap{margin-bottom:28px;}
.login-logo{font-family:'Syne',sans-serif;font-size:58px;font-weight:800;letter-spacing:-3px;line-height:1;color:var(--text);}
.login-logo span{color:var(--accent);}
.login-tagline{font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:500;}
.login-quote{background:var(--bg3);border-left:2px solid var(--accent);border-radius:0 var(--radius3) var(--radius3) 0;padding:12px 14px;margin-bottom:28px;min-height:52px;}
.login-quote-text{font-size:12px;color:var(--text2);font-style:italic;line-height:1.5;}
.login-quote-author{font-size:10px;color:var(--accent3);font-family:'DM Mono',monospace;margin-top:4px;font-weight:500;}
.f-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:7px;display:block;}
.f-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:13px 15px;color:var(--text);font-size:14px;outline:none;transition:all 0.2s;margin-bottom:16px;}
.f-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,0.1);}
.f-input::placeholder{color:var(--text4);}
.login-err{color:var(--red);font-size:12px;margin:-8px 0 14px;display:none;}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius2);color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,106,247,0.3);}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,247,0.45);}
.btn-login:active{transform:scale(0.98);}
.login-links{display:flex;justify-content:space-between;margin-top:14px;}
.login-link{font-size:11px;color:var(--text3);cursor:pointer;transition:color 0.2s;background:none;border:none;padding:0;}
.login-link:hover{color:var(--accent3);}
.login-demo{text-align:center;color:var(--text4);font-size:10px;margin-top:20px;font-family:'DM Mono',monospace;}

/* ═══════════ ONBOARDING ═══════════ */
#onboarding-screen{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);position:relative;}
#onboarding-screen.active{display:flex !important;}
.ob-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:44px;max-width:520px;width:95vw;box-shadow:var(--shadow);}
.ob-step-bar{display:flex;gap:6px;margin-bottom:32px;}
.ob-step-dot{height:3px;flex:1;border-radius:2px;background:var(--border2);transition:background 0.3s;}
.ob-step-dot.active{background:var(--accent);}
.ob-step-dot.done{background:var(--green);}
.ob-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
.ob-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.ob-options{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.ob-option{padding:14px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.2s;text-align:left;}
.ob-option:hover{border-color:var(--accent);color:var(--text);}
.ob-option.selected{border-color:var(--accent);background:rgba(124,106,247,0.1);color:var(--accent4);}
.ob-nav{display:flex;justify-content:space-between;align-items:center;}
.ob-progress{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

/* ═══════════ APP ═══════════ */
#app{display:none;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.sb-logo{padding:28px 22px 16px;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1.5px;display:flex;align-items:baseline;gap:2px;}
.sb-logo span{color:var(--accent);}
.sb-logo-sub{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:0 22px 20px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;}
.sb-trial{margin:12px 14px;background:linear-gradient(135deg,rgba(245,200,66,0.1),rgba(240,72,90,0.1));border:1px solid rgba(245,200,66,0.2);border-radius:var(--radius2);padding:10px 12px;}
.sb-trial-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--yellow);font-weight:700;margin-bottom:3px;}
.sb-trial-time{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);letter-spacing:1px;}
.sb-trial-sub{font-size:9px;color:var(--text3);margin-top:2px;}
.sb-nav{flex:1;padding:8px 10px;overflow-y:auto;}
.sb-section{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text4);padding:14px 10px 6px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius2);cursor:pointer;color:var(--text3);font-size:12px;font-weight:500;transition:all 0.15s;margin-bottom:1px;position:relative;}
.sb-item:hover{background:var(--bg4);color:var(--text);}
.sb-item.active{background:rgba(124,106,247,0.12);color:var(--accent3);}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:var(--accent);border-radius:0 2px 2px 0;}
.sb-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg3);flex-shrink:0;}
.sb-item.active .sb-icon{background:rgba(124,106,247,0.2);}
.sb-bottom{padding:12px 14px 20px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:var(--radius2);margin-bottom:8px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:600;}
.sb-urole{font-size:10px;color:var(--text3);}
.sb-logout{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius2);color:var(--text3);font-size:11px;cursor:pointer;transition:all 0.2s;font-weight:500;}
.sb-logout:hover{border-color:var(--red);color:var(--red);}
.main{margin-left:230px;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(5,5,10,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.menu-btn{display:none;width:34px;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.topbar-score{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;}
.topbar-score-label{font-size:10px;color:var(--text3);}
.topbar-score-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.content{padding:28px;max-width:1440px;}
.page{display:none;animation:fadeUp 0.3s ease both;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ═══════════ COMPONENTS ═══════════ */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;position:relative;overflow:hidden;transition:transform 0.2s,border-color 0.2s;}
.kpi:hover{transform:translateY(-2px);border-color:var(--border3);}
.kpi-top{height:2px;position:absolute;top:0;left:0;right:0;}
.kpi-icon{font-size:18px;margin-bottom:10px;opacity:0.8;}
.kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:5px;}
.kpi-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;line-height:1;margin-bottom:5px;}
.kpi-sub{font-size:10px;font-family:'DM Mono',monospace;}
.kpi-sub.up{color:var(--green);}
.kpi-sub.dn{color:var(--red);}
.kpi-sub.neutral{color:var(--text3);}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;}
.panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.sec-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.badge{font-size:9px;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:20px;font-weight:500;}
.badge-purple{background:rgba(124,106,247,0.15);color:var(--accent3);}
.badge-green{background:rgba(30,217,122,0.15);color:var(--green);}
.badge-red{background:rgba(240,72,90,0.15);color:var(--red);}
.badge-yellow{background:rgba(245,200,66,0.15);color:var(--yellow);}
.badge-cyan{background:rgba(24,212,232,0.15);color:var(--cyan);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.chart-box{position:relative;height:220px;}
.chart-box.tall{height:280px;}
.chart-box.xtall{height:340px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);}
.fi,.fs,.fta{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:10px 12px;color:var(--text);font-size:13px;outline:none;transition:all 0.2s;width:100%;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,247,0.08);}
.fi::placeholder{color:var(--text4);}
.fs option{background:var(--bg3);}
.fta{resize:vertical;min-height:80px;}
.btn{padding:10px 18px;border-radius:var(--radius2);border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s;font-family:'DM Sans',sans-serif;letter-spacing:0.3px;}
.btn-sm{padding:7px 13px;font-size:11px;}
.btn-xs{padding:5px 10px;font-size:10px;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent2);box-shadow:0 4px 16px rgba(124,106,247,0.35);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent3);}
.btn-green{background:var(--green2);color:var(--green);border:1px solid var(--green3);}
.btn-green:hover{background:var(--green3);}
.btn-red{background:var(--red2);color:var(--red);border:1px solid var(--red3);}
.btn-red:hover{background:var(--red3);}
.btn-gold{background:var(--gold2);color:var(--gold);border:1px solid rgba(212,168,67,0.3);}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text4);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid rgba(26,26,46,0.5);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.td-mono{font-family:'DM Mono',monospace;font-size:11px;}
.td-up{color:var(--green);font-family:'DM Mono',monospace;font-size:11px;}
.td-dn{color:var(--red);font-family:'DM Mono',monospace;font-size:11px;}
.td-tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;align-items:center;}
.progress-wrap{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.divider{height:1px;background:var(--border);margin:18px 0;}

/* ═══════════ SCORE CARD ═══════════ */
.score-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--border2);border-radius:var(--radius);padding:24px;text-align:center;position:relative;overflow:hidden;}
.score-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(124,106,247,0.1),transparent 70%);pointer-events:none;}
.score-ring{position:relative;width:140px;height:140px;margin:0 auto 16px;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.score-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-top:4px;}
.score-tips{text-align:left;margin-top:16px;}
.score-tip{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.4;}
.score-tip:last-child{border-bottom:none;}
.score-tip-icon{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;margin-top:1px;}

/* ═══════════ DIVIDA CARD ═══════════ */
.debt-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:16px;margin-bottom:10px;transition:border-color 0.2s;}
.debt-card:hover{border-color:var(--border3);}
.debt-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:8px;}
.debt-meta{display:flex;gap:16px;margin-bottom:10px;}
.debt-meta-item{font-size:11px;color:var(--text3);}
.debt-meta-item span{color:var(--text);font-family:'DM Mono',monospace;}
.debt-progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;}

/* ═══════════ CELEBRATION ═══════════ */
#celebration{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);}
.celeb-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:48px 44px;max-width:420px;width:95vw;text-align:center;position:relative;overflow:hidden;}
.celeb-particles{position:absolute;inset:0;pointer-events:none;}
.celeb-badge{display:inline-block;padding:6px 16px;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.3);border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:20px;}
.celeb-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.2;}
.celeb-debt-name{color:var(--accent3);}
.celeb-phrase{font-size:13px;color:var(--text2);margin-bottom:20px;font-style:italic;}
.celeb-bonus{background:rgba(30,217,122,0.08);border:1px solid rgba(30,217,122,0.2);border-radius:var(--radius2);padding:12px 16px;margin-bottom:24px;font-size:12px;color:var(--green);}
.celeb-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.celeb-stat{background:var(--bg3);border-radius:var(--radius2);padding:12px;}
.celeb-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px;}
.celeb-stat-v{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}

/* ═══════════ PAYMENT WALL ═══════════ */
#paywall{display:none;position:fixed;inset:0;z-index:9990;background:rgba(5,5,10,0.97);backdrop-filter:blur(20px);align-items:center;justify-content:center;}
.pw-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;padding:48px 44px;max-width:460px;width:95vw;text-align:center;box-shadow:var(--shadow),var(--glow);}
.pw-logo{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;letter-spacing:-2px;margin-bottom:4px;}
.pw-logo span{color:var(--accent);}
.pw-headline{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;line-height:1.3;}
.pw-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.pw-price{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--green);line-height:1;}
.pw-price-sub{font-size:12px;color:var(--text3);margin-bottom:24px;margin-top:4px;}
.pw-pix{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);padding:14px 18px;margin-bottom:16px;cursor:pointer;transition:border-color 0.2s;}
.pw-pix:hover{border-color:var(--accent);}
